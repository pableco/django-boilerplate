<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Card Sorting{% endblock %} — Prueba de Menú</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    :root {
      --brand: #5b4fff;
      --brand-light: #ede9ff;
      --surface: #f8f7ff;
    }
    body { font-family: 'Inter', sans-serif; background: var(--surface); }
    .navbar-brand { font-weight: 700; color: var(--brand) !important; }
    .btn-brand {
      background: var(--brand); color: #fff; border: none;
    }
    .btn-brand:hover { background: #4a3fe0; color: #fff; }
    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
  <nav class="navbar navbar-light bg-white border-bottom px-4">
    <a class="navbar-brand" href="{% url 'card_sorting:start' %}">
      <i class="bi bi-grid-3x3-gap-fill me-2"></i>Card Sorting
    </a>
    <span class="text-muted small">Prueba de ordenación de menú</span>
  </nav>

  <main class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
